[env:freenove_esp32_wrover]
platform = espressif32
board = freenove_esp32_wrover
framework = arduino
monitor_speed = 115200

; Força o PlatformIO a escanear subpastas (como a src/ui) para linkar o LVGL corretamente
lib_ldf_mode = deep

lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ 8.4.0

build_flags =
    ; --- Configurações da TFT_eSPI ---
    -D USER_SETUP_LOADED=1
    -D ST7735_DRIVER=1
    -D TFT_WIDTH=128
    -D TFT_HEIGHT=160
    -D ST7735_BLACKTAB=1
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=4
    -D LOAD_GLCD=1
    -D SMOOTH_FONT=1
    
    ; --- Configurações Obrigatórias do LVGL ---
    -D LV_CONF_INCLUDE_SIMPLE
    -I src
    -I $PROJECT_DIR/.pio/libdeps/freenove_esp32_wrover